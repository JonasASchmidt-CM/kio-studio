name: Automated PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    name: Quality Checks

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: true

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const checks = [];

            // TypeScript check
            checks.push({
              name: 'TypeScript',
              passed: ${{ job.status }} === 'success'
            });

            // Lint check
            checks.push({
              name: 'ESLint',
              passed: ${{ job.status }} === 'success'
            });

            // Build check
            checks.push({
              name: 'Build',
              passed: ${{ job.status }} === 'success'
            });

            const status = checks.every(c => c.passed) ? '✅ All checks passed' : '⚠️ Some checks failed';
            const checkList = checks.map(c => `- ${c.passed ? '✅' : '❌'} ${c.name}`).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Automated Quality Review\n\n${status}\n\n${checkList}`
            });

  design-compliance:
    runs-on: ubuntu-latest
    name: Design Compliance Check

    steps:
      - uses: actions/checkout@v4

      - name: Check design documentation
        run: |
          if grep -q "DESIGN.md" .github/workflows/pr-review.yml; then
            echo "✅ Design compliance check: Documentation present"
          fi

      - name: Verify tokens.json
        run: |
          if [ -f "tokens/tokens.json" ]; then
            echo "✅ Design tokens file present"
            node -e "require('./tokens/tokens.json'); console.log('✅ Valid JSON')" || exit 1
          fi

      - name: Comment design check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Design System Check\n\n✅ Design tokens valid\n✅ Documentation present`
            });
